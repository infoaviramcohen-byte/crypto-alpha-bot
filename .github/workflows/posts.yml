name: Crypto Alpha Feed — Auto Posts

on:
  schedule:
    # Max 3 posts/day to @crypto_alphafeed — morning, midday, evening (UTC).
    - cron: "0 7 * * *"    # ~10:00 IDT / 03:00 ET — morning
    - cron: "0 13 * * *"   # ~16:00 IDT / 09:00 ET — midday
    - cron: "0 19 * * *"   # ~22:00 IDT / 15:00 ET — evening
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persist the "already posted" databases between runs so the same
      # article is never posted twice. Without this, each run starts with an
      # empty DB and re-posts whatever is currently top of the news feed.
      - name: Restore dedup databases
        uses: actions/cache@v4
        with:
          path: |
            news.db
            wc_news.db
          key: dedup-db-${{ github.run_id }}
          restore-keys: |
            dedup-db-

      - run: pip install requests feedparser anthropic pillow -q

      - name: Crypto news
        run: python news.py

      - name: WC2026 news
        run: python wc_news.py

      - name: Attention Markets
        if: github.event.schedule == '0 10 * * *'
        run: python attention_markets.py
