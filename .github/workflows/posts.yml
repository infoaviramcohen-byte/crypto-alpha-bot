name: Crypto Alpha Feed — Auto Posts

on:
  schedule:
    - cron: "0 5 * * *"    # news batch 1
    - cron: "0 10 * * *"   # news batch 2 + attention markets
    - cron: "0 15 * * *"   # news batch 3
    - cron: "0 20 * * *"   # news batch 4
    - cron: "0 23 * * *"   # news batch 5
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persist the "already posted" databases between runs so the same
      # article is never posted twice. Without this, each run starts with an
      # empty DB and re-posts whatever is currently top of the news feed.
      - name: Restore dedup databases
        uses: actions/cache@v4
        with:
          path: |
            news.db
            wc_news.db
          key: dedup-db-${{ github.run_id }}
          restore-keys: |
            dedup-db-

      - run: pip install requests feedparser anthropic pillow -q

      - name: Crypto news
        run: python news.py

      - name: WC2026 news
        run: python wc_news.py

      - name: Attention Markets
        if: github.event.schedule == '0 10 * * *'
        run: python attention_markets.py
