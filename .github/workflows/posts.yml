name: Crypto Alpha Feed — Auto Posts

on:
  schedule:
    # Max 3 posts/day to @crypto_alphafeed — morning, midday, evening (UTC).
    # Tuned to peak click hours (US morning/midday + EU afternoon + US evening)
    - cron: "0 14 * * *"   # 14:00 UTC — peak (17:00 IDT / 10:00 ET)
    - cron: "0 17 * * *"   # 17:00 UTC — #1 peak (20:00 IDT / 13:00 ET)
    - cron: "0 22 * * *"   # 22:00 UTC — US evening bump (01:00 IDT / 18:00 ET)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persist the "already posted" databases between runs so the same
      # article is never posted twice. Without this, each run starts with an
      # empty DB and re-posts whatever is currently top of the news feed.
      - name: Restore dedup databases
        uses: actions/cache@v4
        with:
          path: |
            news.db
            wc_news.db
          key: dedup-db-${{ github.run_id }}
          restore-keys: |
            dedup-db-

      - run: pip install requests feedparser anthropic pillow -q

      - name: Crypto news
        run: python news.py

      - name: WC2026 news
        run: python wc_news.py

      - name: Attention Markets
        if: github.event.schedule == '0 10 * * *'
        run: python attention_markets.py
