name: WC2026 Signals Daily

on:
  schedule:
    - cron: '0 9 * * *'      # Daily 12:00 Israel — morning brief
    - cron: '0 14 * * 1-5'   # Mon–Fri 17:00 Israel — afternoon post
    - cron: '0 19 * * 3,4'   # Wed & Thu extra — 22:00 Israel evening
    # NOTE: removed the 07:00 Wed/Thu cron — it landed in the same "morning"
    # bucket (hour < 11) as the 09:00 daily run, causing duplicate morning posts.
  workflow_dispatch:          # Manual trigger anytime

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python wc2026_bot.py
